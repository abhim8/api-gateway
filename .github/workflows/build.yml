name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 26 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: temurin
          cache: maven

      - name: Format check
        run: ./mvnw spotless:check --batch-mode

      - name: Build and verify
        run: ./mvnw clean verify --batch-mode
