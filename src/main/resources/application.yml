server:
  port: 8000
  shutdown: graceful
  netty:
    connection-timeout: 5s

spring:
  profiles:
    active: local
  application:
    name: api-gateway
  lifecycle:
    timeout-per-shutdown-phase: 30s
  codec:
    max-in-memory-size: 256KB
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s
      connect-timeout: 2s

  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins: ${GATEWAY_CORS_ORIGINS:https://app.example.com}
                allowedMethods: GET,POST,PUT,DELETE,PATCH,OPTIONS
                allowedHeaders: Authorization,Content-Type,X-Correlation-ID
                allowCredentials: true
                maxAge: 1800
          routes:
            - id: auth
              uri: ${AUTH_PLATFORM_URL:http://localhost:8004}
              predicates:
                - Path=/internal/v1/auth/**,/internal/v1/api-keys/**
            - id: template-service
              uri: ${TEMPLATE_SERVICE_URL:http://localhost:8002}
              predicates:
                - Path=/api/v1/templates
              filters:
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@gatewayKeyResolver}"
                    rate-limiter: "#{@redisRateLimiter}"
                - name: CircuitBreaker
                  args:
                    name: template-service
                    fallbackUri: forward:/fallback
      httpclient:
        response-timeout: 5s
        connect-timeout: 3000
        pool:
          type: ELASTIC
          max-connections: 500
          max-idle-time: 60s

management:
  health:
    redis:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,gateway,configprops
      base-path: /actuator
  endpoint:
    health:
      show-details: never
    gateway:
      access: read-only
  metrics:
    tags:
      application: ${spring.application.name}

gateway:
  authentication:
    provider: remote
    remote:
      base-url: http://localhost:8004
      connect-timeout: 2s
      read-timeout: 5s
      relay-response-headers:
        - Authorization
        - Set-Cookie
  logging:
    request-timing:
      enabled: true
      slow-request-threshold: 1000ms
  observability:
    response-headers:
      enabled: true
      correlation-id: true
  rate-limit:
    enabled: true
    replenish-rate: 2
    burst-capacity: 2
    requested-tokens: 1
    deny-empty-key: true
    empty-key-status: 401
  circuit-breaker:
    enabled: true
    defaults:
      sliding-window-size: 10
      minimum-number-of-calls: 5
      failure-rate-threshold: 50
      wait-duration-in-open-state: 30s
      permitted-number-of-calls-in-half-open-state: 3
      automatic-transition-from-open-to-half-open-enabled: true

logging:
  level:
    root: ${DEFAULT_LOG_LEVEL:INFO}
    gateway: DEBUG
    io.github.resilience4j: DEBUG
    org.springframework.cloud.gateway.route.RouteDefinitionRouteLocator: WARN

otel:
  service:
    name: ${spring.application.name}
  traces:
    exporter: ${OTEL_TRACES_EXPORTER:otlp}
  logs:
    exporter: none
  metrics:
    exporter: none
  propagators: tracecontext,baggage
