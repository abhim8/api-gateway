server:
  port: 8080
  shutdown: graceful
  netty:
    connection-timeout: 5s

spring:
  application:
    name: api-gateway
  lifecycle:
    timeout-per-shutdown-phase: 30s
  codec:
    max-in-memory-size: 256KB

  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins: ${GATEWAY_CORS_ORIGINS:https://app.example.com}
                allowedMethods: GET,POST,PUT,DELETE,PATCH,OPTIONS
                allowedHeaders: Authorization,Content-Type,X-Correlation-ID
                allowCredentials: true
                maxAge: 1800
          httpclient:
            response-timeout: 5s
            connect-timeout: 3000
            pool:
              type: ELASTIC
              max-connections: 500
              max-idle-time: 60s
          routes:
            - id: example
              uri: http://example-service:8080
              predicates:
                - Path=/api/v1/example/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: exampleCB
                    fallbackUri: forward:/fallback/example
                    statusCodes:
                      - "500"
                      - "502"
                      - "503"
                      - "504"
                - name: Retry
                  args:
                    retries: 3
                    series:
                      - SERVER_ERROR
                    methods:
                      - GET
                    statuses:
                      - INTERNAL_SERVER_ERROR
                      - BAD_GATEWAY
                      - SERVICE_UNAVAILABLE
                - StripPrefix=1

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:https://auth.example.com}
          jwk-set-uri: ${JWKS_URI:https://auth.example.com/.well-known/jwks.json}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
      base-path: /actuator
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  metrics:
    tags:
      application: ${spring.application.name}

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
    instances:
      exampleCB:
        baseConfig: default

logging:
  level:
    root: ${DEFAULT_LOG_LEVEL:INFO}

otel:
  service:
    name: ${spring.application.name}
  resource:
    attributes:
      service.name: ${spring.application.name}
  traces:
    exporter: ${OTEL_TRACES_EXPORTER:otlp}
  logs:
    exporter: none
  metrics:
    exporter: none
  propagators: tracecontext,baggage
