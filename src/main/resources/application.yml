server:
  port: 8000
  shutdown: graceful
  netty:
    connection-timeout: 5s

spring:
  application:
    name: api-gateway
  lifecycle:
    timeout-per-shutdown-phase: 30s
  codec:
    max-in-memory-size: 256KB

  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins: ${GATEWAY_CORS_ORIGINS:https://app.example.com}
                allowedMethods: GET,POST,PUT,DELETE,PATCH,OPTIONS
                allowedHeaders: Authorization,Content-Type,X-Correlation-ID
                allowCredentials: true
                maxAge: 1800
          routes:
            - id: template-service
              uri: ${TEMPLATE_SERVICE_URL:http://localhost:8002}
              predicates:
                - Path=/api/v1/templates
      httpclient:
        response-timeout: 5s
        connect-timeout: 3000
        pool:
          type: ELASTIC
          max-connections: 500
          max-idle-time: 60s

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,gateway,configprops
      base-path: /actuator
  endpoint:
    health:
      show-details: never
    gateway:
      access: read-only
  metrics:
    tags:
      application: ${spring.application.name}

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
#    instances: {}

gateway:
  authentication:
    provider: mock
  logging:
    request-timing:
      enabled: true
      slow-request-threshold: 1000ms
  observability:
    response-headers:
      enabled: true
      correlation-id: true
  rate-limit:
    enabled: false
    replenish-rate: 1
    burst-capacity: 1
    requested-tokens: 1
    deny-empty-key: true
    empty-key-status: 401

logging:
  level:
    root: ${DEFAULT_LOG_LEVEL:INFO}
    gateway: DEBUG
    org.springframework.cloud.gateway.route.RouteDefinitionRouteLocator: WARN

otel:
  service:
    name: ${spring.application.name}
  traces:
    exporter: ${OTEL_TRACES_EXPORTER:otlp}
  logs:
    exporter: none
  metrics:
    exporter: none
  propagators: tracecontext,baggage
